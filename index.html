<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>一筆畫益智遊戲 - 執行期場景</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/phaser/3.60.0/phaser.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0f172a;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }
        #game-container {
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            border-radius: 16px;
            overflow: hidden;
        }
    </style>
</head>
<body>

<div id="game-container"></div>

<script>
// --- 遊戲全域核心變數 ---
let levelData = null;       // 儲存從後端 /api/level.js 抓回來的 JSON
let tileSize = 50;          // 每個格子的基礎像素大小 (會根據地圖大小動態縮放)
let currentRows = 0;
let currentCols = 0;

// 圖層與物件群組陣列
let gridCells = [];         // 儲存地圖網格資料
let fogTiles = [];          // 二維陣列，儲存所有的迷霧精靈 (Sprite)
let pathLineGraphics;       // 用於繪製玩家拉線軌跡的畫筆
let playerPath = [];        // 玩家目前走過的路徑座標歷史紀錄 [{r, c}, ...]

// 互動狀態機鎖定
let isDrawing = false;
let currentHead = { r: -1, c: -1 };

// --- Phaser 遊戲本體設定 ---
const config = {
    type: Phaser.AUTO,
    width: 600,
    height: 600,
    parent: 'game-container',
    backgroundColor: '#1e293b',
    scene: {
        preload: preload,
        create: create,
        update: update
    }
};

const game = new Phaser.Game(config);

// 1. 資源預載階段 (Preload)
function preload() {
    // 這裡使用 Phaser 的 Graphics 記憶體動態繪製法來產生圖示，免去外部圖片載入失敗的風險
    // 在正式專案中，您可以改為 scene.load.image('key', 'url')
}

// 2. 場景初始化與後端對接階段 (Create)
function create() {
    const scene = this;
    pathLineGraphics = scene.add.graphics();
    pathLineGraphics.setDepth(10); // 確保玩家拉線畫在格子上方

    // 取得 URL 上的關卡參數（預設第 52 關）
    const urlParams = new URLSearchParams(window.location.search);
    const targetLevel = urlParams.get('level') || 52;

    // 向後端 /api/level.js 發送關卡讀取請求
    fetch(`/api/level?level=${targetLevel}`)
        .then(response => response.json())
        .then(data => {
            levelData = data;
            currentRows = data.rows;
            currentCols = data.cols;

            // 根據後端傳來的行列數，動態計算最適合的格子尺寸，確保 4x4 到 12x12 都能完美滿版
            tileSize = Math.floor(600 / Math.max(currentRows, currentCols));

            // 初始化二維陣列空間
            gridCells = Array.from({ length: currentRows }, () => Array(currentCols).fill(null));
            fogTiles = Array.from({ length: currentRows }, () => Array(currentCols).fill(null));

            // 建構遊戲地圖與機關圖層
            renderGameBoard(scene);
            
            // 綁定滑鼠與觸控事件
            setupInputListeners(scene);
        })
        .catch(err => console.error("後端 API 連接失敗或中斷:", err));
}

// 3. 每幀即時刷新階段 (Update)
function update() {
    // 即時繪製玩家畫出來的一筆畫線條
    if (playerPath.length > 0) {
        pathLineGraphics.clear();
        pathLineGraphics.lineStyle(8, 0x3b82f6, 1); // 亮藍色線條
        pathLineGraphics.beginPath();
        
        // 從起點開始連線
        const startX = playerPath[0].c * tileSize + tileSize / 2;
        const startY = playerPath[0].r * tileSize + tileSize / 2;
        pathLineGraphics.moveTo(startX, startY);

        for (let i = 1; i < playerPath.length; i++) {
            const nextX = playerPath[i].c * tileSize + tileSize / 2;
            const nextY = playerPath[i].r * tileSize + tileSize / 2;
            pathLineGraphics.lineTo(nextX, nextY);
        }
        pathLineGraphics.strokePath();
    }
}

// --- 核心內部自訂函式模組 ---

/**
 * 解析後端資料，繪製完整的地圖結構與機關
 */
function renderGameBoard(scene) {
    const mapMatrix = levelData.map;

    for (let r = 0; r < currentRows; r++) {
        for (let c = 0; c < currentCols; c++) {
            const tileType = mapMatrix[r][c];

            // 如果後端代號為 0，代表此格為無法通行的「空格外圍」，不進行繪製
            if (tileType === 0) continue;

            // 計算每格的精確座標位置
            const x = c * tileSize;
            const y = r * tileSize;

            // 繪製基礎可玩路徑格底座
            let cellBg = scene.add.rectangle(x + tileSize/2, y + tileSize/2, tileSize - 4, tileSize - 4, 0x334155);
            cellBg.setStrokeStyle(2, 0x475569);
            gridCells[r][c] = { bg: cellBg, type: tileType };

            // 依據後端代號渲染對應機關元件
            if (tileType === 2) { // 起點
                scene.add.circle(x + tileSize/2, y + tileSize/2, tileSize/4, 0xf8fafc);
                // 預設將起點加入玩家路徑歷史中
                currentHead = { r, c };
                playerPath.push({ r, c });
            } 
            else if (tileType === 7) { // 十字橋
                // 畫出水平與垂直交會箭頭或雙十字線段
                let bridgeIcon = scene.add.rectangle(x + tileSize/2, y + tileSize/2, tileSize/2, tileSize/2, 0x1e3a8a);
                bridgeIcon.setStrokeStyle(2, 0x60a5fa);
            } 
            else if (tileType === 3) { // 傳送門
                scene.add.circle(x + tileSize/2, y + tileSize/2, tileSize/3, 0xa855f7).setAlpha(0.8);
            } 
            else if (tileType === 4) { // 炸彈
                scene.add.rectangle(x + tileSize/2, y + tileSize/2, tileSize/3, tileSize/3, 0xef4444);
            } 
            else if (tileType === 5) { // 初始不可通行的隱藏磚牆
                cellBg.setFillStyle(0x1e293b); // 設定深黑色外觀
            }

            // 【黑夜迷霧圖層渲染】
            // 如果後端標記包含迷霧關卡，在整張地圖上方覆蓋一層黑霧
            if (levelData.isFogLevel) {
                let fog = scene.add.rectangle(x + tileSize/2, y + tileSize/2, tileSize, tileSize, 0x020617);
                fog.setDepth(20); // 確保黑霧覆蓋在普通機關上方
                fogTiles[r][c] = fog;
            }
        }
    }

    // 初始開霧：進關卡時，自動驅散起點周圍九宮格的迷霧
    if (levelData.isFogLevel && currentHead.r !== -1) {
        revealFogAroundCoordinates(scene, currentHead.r, currentHead.c, 1);
    }
}

/**
 * 綁定滑鼠與手勢觸控的一筆畫拖曳機制
 */
function setupInputListeners(scene) {
    scene.input.on('pointerdown', (pointer) => {
        const gridPos = getGridCoords(pointer.x, pointer.y);
        // 當玩家點擊的位置剛好是目前線條的末端（起點），開啟劃線狀態機
        if (gridPos && gridPos.r === currentHead.r && gridPos.c === currentHead.c) {
            isDrawing = true;
        }
    });

    scene.input.on('pointermove', (pointer) => {
        if (!isDrawing) return;

        const gridPos = getGridCoords(pointer.x, pointer.y);
        if (!gridPos) return;

        const { r, c } = gridPos;

        // 判定滑動是否進入了相鄰的新格子
        if (r !== currentHead.r || c !== currentHead.c) {
            // 檢查這格是不是可以踩的合法鄰居
            if (isValidMove(r, c)) {
                executeMoveToNewCell(scene, r, c);
            }
        }
    });

    scene.input.on('pointerup', () => {
        isDrawing = false;
    });
}

/**
 * 核心移動控制器：處理一般行走、十字橋複踩、以及傳送門動態開霧
 */
function executeMoveToNewCell(scene, r, c) {
    const tileType = levelData.map[r][c];

    // 1. 將該格塞入軌跡陣列
    playerPath.push({ r, c });
    currentHead = { r, c };

    // 2. 常規開霧：每走一步，就驅散周圍一格的迷霧
    if (levelData.isFogLevel) {
        revealFogAroundCoordinates(scene, r, c, 1);
    }

    // 3. ✨ 觸發傳送門連動事件 (解決 Level 250 迷霧盲跳問題)
    if (tileType === 3) {
        const portalKey = `${r},${c}`;
        const dest = levelData.portals[portalKey];

        if (dest) {
            // 如果目的地還沒被踩過，執行空間跨區連動
            if (!isCellVisitedInHistory(dest.r, dest.c)) {
                // 驅散傳送門「目的地」周圍的迷霧，消除盲區
                if (levelData.isFogLevel) {
                    revealFogAroundCoordinates(scene, dest.r, dest.c, 1);
                }

                // 將歷史軌跡推入目的地座標（一步算兩格）
                playerPath.push({ r: dest.r, c: dest.c });
                currentHead = { r: dest.r, c: dest.c };
            }
        }
    }
}

/**
 * 基礎防錯判定：檢查格子是否可以踩踏
 */
function isValidMove(r, c) {
    // 超出網格邊界，擋掉
    if (r < 0 || r >= currentRows || c < 0 || c >= currentCols) return false;
    // 該格在後端矩陣是空格 0 或隱藏牆 5，擋掉
    if (levelData.map[r][c] === 0 || levelData.map[r][c] === 5) return false;

    // 必須是上下左右相鄰的格子（距離為 1）
    const distance = Math.abs(r - currentHead.r) + Math.abs(c - currentHead.c);
    if (distance !== 1) return false;

    // 如果已經踩過
    if (isCellVisitedInHistory(r, c)) {
        // 特例：如果是十字橋（7），且歷史紀錄中只踩過它「一次」，允許第二次正交跨越
        if (levelData.map[r][c] === 7 && countVisitedTimes(r, c) === 1) {
            return true;
        }
        return false; // 一般格子踩過不能再踩
    }

    return true;
}

/**
 * ✨ 核心圖層驅散演算法：利用 Phaser Tweens 平滑淡出迷霧
 */
function revealFogAroundCoordinates(scene, centerR, centerC, radius = 1) {
    for (let r = centerR - radius; r <= centerR + radius; r++) {
        for (let c = centerC - radius; c <= centerC + radius; c++) {
            if (r >= 0 && r < currentRows && c >= 0 && c < currentCols) {
                const fogSprite = fogTiles[r][c];
                // 如果該座標存在黑霧，且尚未透明，執行淡出動畫
                if (fogSprite && fogSprite.alpha > 0) {
                    scene.tweens.add({
                        targets: fogSprite,
                        alpha: 0,
                        duration: 180, // 0.18 秒平滑變透明
                        onComplete: () => {
                            fogSprite.setVisible(false); // 銷毀渲染，節省記憶體
                        }
                    });
                }
            }
        }
    }
}

// --- 輔助工具小函式 ---
function getGridCoords(pixelX, pixelY) {
    const c = Math.floor(pixelX / tileSize);
    const r = Math.floor(pixelY / tileSize);
    if (r >= 0 && r < currentRows && c >= 0 && c < currentCols) return { r, c };
    return null;
}

function isCellVisitedInHistory(r, c) {
    return playerPath.some(pos => pos.r === r && pos.c === c);
}

function countVisitedTimes(r, c) {
    return playerPath.filter(pos => pos.r === r && pos.c === c).length;
}
</script>

</body>
</html>
